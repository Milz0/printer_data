[gcode_macro _MMU_SELECT_GATE]
description: Helper macro to call T0-T7 by gate number
gcode:
  {% set gate = params.GATE|int %}

  {% if gate == 0 %}
    T0
  {% elif gate == 1 %}
    T1
  {% elif gate == 2 %}
    T2
  {% elif gate == 3 %}
    T3
  {% elif gate == 4 %}
    T4
  {% elif gate == 5 %}
    T5
  {% elif gate == 6 %}
    T6
  {% elif gate == 7 %}
    T7
  {% else %}
    {action_raise_error("Invalid gate: %s. Valid gates are 0 to 7." % gate)}
  {% endif %}


[gcode_macro MMU_CHANGE_TEST]
description: Repeated filament-change test across selected gates
gcode:
  {% set gates_raw = params.GATES|default("0,1,2,3,4,5,6,7")|string %}
  {% set repeats = params.REPEATS|default(1)|int %}
  {% set dwell_ms = params.DWELL|default(0)|int %}
  {% set extrude_len = params.EXTRUDE|default(80)|float %}
  {% set extrude_speed = params.EXTRUDE_SPEED|default(5)|float %}
  {% set z_height = params.Z|default(100)|float %}
  {% set gates = gates_raw.split(",") %}

  {% if repeats < 1 %}
    {action_raise_error("REPEATS must be 1 or greater")}
  {% endif %}

  {% if extrude_len < 0 %}
    {action_raise_error("EXTRUDE must be 0 or greater")}
  {% endif %}

  {% if extrude_speed <= 0 %}
    {action_raise_error("EXTRUDE_SPEED must be greater than 0")}
  {% endif %}

  {% if z_height < 0 %}
    {action_raise_error("Z must be 0 or greater")}
  {% endif %}

  {% if "z" not in printer.toolhead.homed_axes %}
    {action_raise_error("Z axis must be homed before running MMU_CHANGE_TEST")}
  {% endif %}

  {action_respond_info("MMU_CHANGE_TEST starting: gates=%s repeats=%d dwell=%dms extrude=%.1fmm speed=%.1fmm/s z=%.1f" % (gates_raw, repeats, dwell_ms, extrude_len, extrude_speed, z_height))}

  SAVE_GCODE_STATE NAME=MMU_CHANGE_TEST_state
  G90
  M83
  G1 Z{z_height} F1800

  {% for r in range(repeats) %}
    {action_respond_info("MMU_CHANGE_TEST round %d of %d" % (r + 1, repeats))}
    {% for gate_str in gates %}
      {% set gate_clean = gate_str|trim %}
      {% if gate_clean not in ["0","1","2","3","4","5","6","7"] %}
        {action_raise_error("Invalid gate in GATES list: '%s'" % gate_clean)}
      {% endif %}

      {action_respond_info("MMU_CHANGE_TEST selecting gate %s" % gate_clean)}
      _MMU_SELECT_GATE GATE={gate_clean}

      {% if extrude_len > 0 %}
        {action_respond_info("MMU_CHANGE_TEST extruding %.1fmm after gate %s" % (extrude_len, gate_clean))}
        G1 E{extrude_len} F{extrude_speed * 60}
      {% endif %}

      {% if dwell_ms > 0 %}
        G4 P{dwell_ms}
      {% endif %}
    {% endfor %}
  {% endfor %}

  RESTORE_GCODE_STATE NAME=MMU_CHANGE_TEST_state
  {action_respond_info("MMU_CHANGE_TEST complete")}