########################################################################################################################
# Happy Hare MMU - Purge & Wipe Macro
#
# EDIT THIS FILE BASED ON YOUR SETUP
#
# Goal: Replicate the Bambu A1 filament change purge/wipe sequence:
#   - Low fan during purge
#   - Constant speed purge (no pulsatile)
#   - Mid-purge wipe if volume is large
#   - Final wipe: fan 100%, 3s dwell, 3x fast+slow strokes, fan restored
#   - Post-purge dwell before returning to print
#
# Designed for:
#   - Voron Switchwire extended 100mm left
#   - Bambu A1 purge wiper at X=-62
#   - Revo Voron HF hotend
#   - Happy Hare MMU with force_purge_standalone: 1
#
# Required in mmu_parameters.cfg (already set):
#   purge_macro: 'PURGE_WIPE_LEFT_SERVICE_AREA'
#   force_purge_standalone: 1
#   extruder_purge_current: 120
#
# Required in mmu_macro_vars.cfg:
#   _MMU_SEQUENCE_VARS:
#     variable_pre_unload_position          : -62, -999, 0
#     variable_user_post_form_tip_extension : '_SERVO_RETRACT_DWELL'
#   _MMU_PURGE_VARS:
#     variable_extruder_purge_speed         : 10
#   _MMU_CUT_TIP_VARS:
#     variable_gantry_servo_enabled         : True
#     variable_gantry_servo_down_angle      : 120
#     variable_gantry_servo_up_angle        : 40
#     variable_pin_loc_xy                   : -62, 125
#     variable_pin_park_dist                : 0
#     variable_pin_loc_compressed_xy        : -62, 125
#     variable_cut_fast_move_fraction       : 0.0
#     variable_safe_margin_xy               : 0, 0
#     variable_cut_dwell_time               : 0
#     variable_rip_length                   : 2    <- retract before servo up (correct order)
#     variable_pushback_length              : 0    <- ZERO, handled in _SERVO_RETRACT_DWELL
#     variable_rip_speed                    : 5
#
# Required in mmu_hardware.cfg:
#   [mmu_servo mmu_gantry_servo]
#     initial_angle: 40
#   [delayed_gcode servo_startup_test]
#     gcode:
#       SET_SERVO SERVO=mmu_gantry_servo ANGLE=40
#
# (\_/)
# ( *,*)
# (")_(") Happy Hare Ready
#


########################################################################################################################
# WIPER CONFIGURATION VARIABLES
#
[gcode_macro _WIPER_VARS]
description: Configuration variables for the left service area wiper
gcode: # Leave empty

# --- Position ---
variable_wiper_x              : -62      # X coordinate of the wiper bucket
variable_wiper_y              : 125      # Y coordinate during purge (mid-bed)

# --- Wipe motion ---
# Bambu A1 uses two speeds per stroke:
#   Fast move away from wiper  : 300mm/s for 10mm
#   Slow move back to wiper    :  50mm/s for 10mm
# This combination snaps the cooled string cleanly without flicking debris
variable_wipe_fast_dist       : 10       # mm fast move away from wiper per stroke
variable_wipe_slow_dist       : 10       # mm slow return move back to wiper per stroke
variable_wipe_fast_speed      : 300      # mm/s fast wipe stroke (away from wiper)
variable_wipe_slow_speed      : 50       # mm/s slow wipe stroke (return to wiper)
variable_wipe_count           : 3        # number of full wipe cycles
variable_wipe_z_hop           : 0.5      # mm Z lift during wipe strokes

# --- Minimum purge length ---
# Safety floor so there is always enough material to form a good blob
# regardless of what Orca calculates
variable_min_purge_length     : 50       # mm minimum purge regardless of slicer volume

# --- Mid-purge wipe threshold ---
# If total purge length exceeds this, split into two stages with a wipe
# between them to clear the accumulated blob before continuing.
# Set to 0 to disable mid-purge wipe entirely.
variable_mid_wipe_threshold   : 100      # mm purge length that triggers a mid-purge wipe

# --- Fan speeds ---
# Purge fan: low speed during purging - keeps filament from sticking to
# nozzle without over-cooling the melt zone.
variable_fan_purge_speed      : 60       # PWM 0-255 during purge

# Final wipe uses 100% fan for maximum solidification before wipe strokes.
# Dwell time at 100% fan before strokes fire, in milliseconds.
variable_fan_wipe_dwell       : 3000     # ms dwell at 100% fan before wipe strokes

# --- Post-purge decompression ---
# Retract after final wipe to relieve filament path compression built up
# during sync purge (gear + extruder both pushing). Without this the
# compressed filament springs out as a blob on print resume.
# Increase if blob persists, decrease if gap appears on first print move.
variable_decomp_retract       : 3.0     # mm retract after final wipe for decompression

# --- Post-purge dwell ---
# Dwell at wiper after final wipe before returning to print.
# Allows residual ooze to solidify rather than dragging onto the print.
variable_post_purge_dwell     : 0      # ms dwell after wipe before returning to print

# --- Travel ---
variable_travel_speed         : 200      # mm/s for travel moves to wiper
variable_min_z_travel         : 2        # mm minimum Z during travel to wiper


########################################################################################################################
# SERVO RETRACT DWELL
#
# Called via user_post_form_tip_extension after _MMU_CUT_TIP completes.
#
# With rip_length:2 and pushback_length:0 in mmu_macro_vars.cfg the
# read-only mmu_cut_tip.cfg sequence is:
#   1. Servo DOWN to 120° → G4 P500 dwell
#   2. Cut executes
#   3. G1 E-2 F300 rip retract (rip_length:2, rip_speed:5) - before servo up
#   4. Servo UP signal sent to 40° DURATION=0.5
#   5. THIS MACRO fires:
#      a. SET_SERVO 40° DURATION=1.5 - active power drives servo fully back
#      b. G4 P1000 - servo reaches 40° AND blade fully clears filament path
#      c. G1 E15 F1500 - pushback 15mm at 25mm/s
#      d. G1 E-15 F1500 - retract back 15mm at 25mm/s
#
# Correct order achieved: cut → retract → servo up → wait → pushback
#
# pushback_length MUST be 0 in mmu_macro_vars.cfg (we do it here)
# rip_length MUST be 2 in mmu_macro_vars.cfg (retract before servo up)
#
[gcode_macro _SERVO_RETRACT_DWELL]
description: Active servo return, wait for blade to clear, then pushback
gcode:
    SET_SERVO SERVO=mmu_gantry_servo ANGLE=40 DURATION=1.5
    G4 P1000         # servo reaches 40° and blade fully clears filament path
    G1 E15 F1500     # pushback 15mm at 25mm/s
    G1 E-15 F1500    # retract back 15mm at 25mm/s


########################################################################################################################
# PURGE_WIPE_LEFT_SERVICE_AREA
#
# Called by Happy Hare as purge_macro after every toolchange.
# Toolhead is already at X=-62 from pre_unload_position move.
#
# Sequence:
#   1. Un-retract HH retraction
#   2. Confirm position at wiper
#   3. Low fan on (S60)
#   4. Purge stage 1 at constant speed
#   5. Mid-wipe if total volume > threshold (fan 100%, 3s, 3x strokes)
#   6. Purge stage 2 if mid-wipe fired
#   7. Final wipe: fan 100%, 3s dwell, 3x strokes + flick
#   8. Fan restored to pre-toolchange speed
#   9. Post-purge dwell
#  10. Re-retract
#
[gcode_macro PURGE_WIPE_LEFT_SERVICE_AREA]
description: Bambu A1 style purge and wipe into left service area
gcode:
    # --- Load wiper config ---
    {% set wvars              = printer['gcode_macro _WIPER_VARS'] %}
    {% set wiper_x            = wvars.wiper_x | float %}
    {% set wiper_y            = wvars.wiper_y | float %}
    {% set wipe_fast_dist     = wvars.wipe_fast_dist | float %}
    {% set wipe_slow_dist     = wvars.wipe_slow_dist | float %}
    {% set wipe_fast_speed    = wvars.wipe_fast_speed | float %}
    {% set wipe_slow_speed    = wvars.wipe_slow_speed | float %}
    {% set wipe_count         = wvars.wipe_count | int %}
    {% set wipe_z_hop         = wvars.wipe_z_hop | float %}
    {% set mid_wipe_threshold = wvars.mid_wipe_threshold | float %}
    {% set min_purge_length   = wvars.min_purge_length | float %}
    {% set fan_purge_speed    = wvars.fan_purge_speed | int %}
    {% set fan_wipe_dwell     = wvars.fan_wipe_dwell | int %}
    {% set decomp_retract     = wvars.decomp_retract | float %}
    {% set post_purge_dwell   = wvars.post_purge_dwell | int %}
    {% set travel_speed       = wvars.travel_speed | float %}
    {% set min_z_travel       = wvars.min_z_travel | float %}

    # --- Load Happy Hare state ---
    {% set sequence_vars      = printer['gcode_macro _MMU_SEQUENCE_VARS'] %}
    {% set park_vars          = printer['gcode_macro _MMU_PARK'] %}
    {% set retracted_length   = park_vars.retracted_length | float %}
    {% set unretract_speed    = sequence_vars.unretract_speed | int %}
    {% set lift_speed         = sequence_vars.park_lift_speed | float %}

    # --- Load purge data ---
    {% set purge_volume       = printer.mmu.toolchange_purge_volume | default(0) | float %}
    {% set purge_vars         = printer['gcode_macro _MMU_PURGE_VARS'] %}
    {% set purge_speed        = purge_vars.extruder_purge_speed | float %}

    # --- Calculate purge length from volume ---
    {% set filament_diameter      = printer.configfile.config.extruder.filament_diameter | float %}
    {% set filament_cross_section = (filament_diameter / 2.0) ** 2 * 3.14159 %}
    {% set calc_purge_length      = purge_volume / filament_cross_section %}

    # Enforce minimum purge length
    {% set total_purge_length = [calc_purge_length, min_purge_length] | max %}
    {% if calc_purge_length < min_purge_length %}
        MMU_LOG MSG="Slicer purge {calc_purge_length|round(1)}mm below minimum - enforcing {min_purge_length}mm"
    {% endif %}

    # Split into two stages if above mid-wipe threshold
    {% if total_purge_length > mid_wipe_threshold %}
        {% set purge_length_1 = total_purge_length * 0.6 %}
        {% set purge_length_2 = total_purge_length * 0.4 %}
    {% else %}
        {% set purge_length_1 = total_purge_length %}
        {% set purge_length_2 = 0 %}
    {% endif %}

    MMU_LOG MSG="Wiper purge: {purge_volume|round(1)}mm³ = {total_purge_length|round(1)}mm  stage1={purge_length_1|round(1)}mm stage2={purge_length_2|round(1)}mm @ {purge_speed}mm/s"

    # --- Safety ---
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        MMU_LOG MSG="Cannot purge/wipe - XYZ not homed" ERROR=1
    {% else %}

        SAVE_GCODE_STATE NAME=_WIPER_PURGE_state
        G90    # Absolute XYZ
        M83    # Relative extrusion

        # ---------------------------------------------------------------
        # Step 1: Un-retract Happy Hare managed retraction
        # ---------------------------------------------------------------
        {% if retracted_length > 0 %}
            MMU_LOG MSG="Un-retracting {retracted_length}mm"
            G1 E{retracted_length} F{unretract_speed * 60}
        {% endif %}

        # ---------------------------------------------------------------
        # Step 2: Confirm position at wiper
        # ---------------------------------------------------------------
        {% set current_z = printer.gcode_move.gcode_position.z %}
        {% set safe_z    = [current_z, min_z_travel] | max %}
        G1 Z{safe_z} F{lift_speed * 60}
        G1 X{wiper_x} Y{wiper_y} F{travel_speed * 60}

        # ---------------------------------------------------------------
        # Step 3: Low fan on during purge
        # ---------------------------------------------------------------
        {% set orig_fan = printer.fan.speed %}
        M106 S{fan_purge_speed}

        # ---------------------------------------------------------------
        # Step 4: PURGE STAGE 1 - constant speed
        # ---------------------------------------------------------------
        {% if purge_length_1 > 0 %}
            MMU_LOG MSG="Purging stage 1: {purge_length_1|round(1)}mm"
            G1 E{purge_length_1} F{purge_speed * 60}
        {% endif %}

        # ---------------------------------------------------------------
        # Step 5: MID-WIPE (only if stage 2 exists)
        # Fan 100%, 3s dwell, wipe strokes, back to purge fan
        # ---------------------------------------------------------------
        {% if purge_length_2 > 0 %}
            M400
            M106 S255
            G4 P{fan_wipe_dwell}
            {% set wipe_z = safe_z + wipe_z_hop %}
            G1 Z{wipe_z} F{lift_speed * 60}
            {% for _ in range(wipe_count) %}
                G1 X{wiper_x + wipe_fast_dist} F{wipe_fast_speed * 60}
                G1 X{wiper_x}                  F{wipe_slow_speed * 60}
            {% endfor %}
            G1 Z{safe_z} F{lift_speed * 60}
            M400
            M106 S0
            M106 S{fan_purge_speed}
        {% endif %}

        # ---------------------------------------------------------------
        # Step 6: PURGE STAGE 2 - constant speed
        # ---------------------------------------------------------------
        {% if purge_length_2 > 0 %}
            MMU_LOG MSG="Purging stage 2: {purge_length_2|round(1)}mm"
            G1 E{purge_length_2} F{purge_speed * 60}
        {% endif %}

        # ---------------------------------------------------------------
        # Step 7: FINAL WIPE
        # Fan 100%, 3s dwell to solidify, 3x fast/slow strokes + flick
        # ---------------------------------------------------------------
        M400
        M106 S255
        G4 P{fan_wipe_dwell}

        {% set wipe_z = safe_z + wipe_z_hop %}
        G1 Z{wipe_z} F{lift_speed * 60}

        {% for _ in range(wipe_count) %}
            G1 X{wiper_x + wipe_fast_dist} F{wipe_fast_speed * 60}
            G1 X{wiper_x}                  F{wipe_slow_speed * 60}
        {% endfor %}
        # Final fast flick to clear string end
        G1 X{wiper_x + wipe_fast_dist} F{wipe_fast_speed * 60}

        # Decompression retract - relieves filament path pressure built up
        # during sync purge (both gear + extruder motors pushing).
        # Without this the compressed filament springs out as a blob on resume.
        # Tune via variable_decomp_retract in _WIPER_VARS above.
        M83
        G1 E-{decomp_retract} F{unretract_speed * 60}

        M400

        # ---------------------------------------------------------------
        # Step 8: Restore fan to pre-toolchange speed
        # ---------------------------------------------------------------
        M106 S{(orig_fan * 255) | int}

        # ---------------------------------------------------------------
        # Step 9: Post-purge dwell
        # ---------------------------------------------------------------
        G4 P{post_purge_dwell}

        {% if printer.mmu.sync_feedback_enabled %}
            MMU_SYNC_FEEDBACK ADJUST_TENSION=1
        {% endif %}

        RESTORE_GCODE_STATE NAME=_WIPER_PURGE_state MOVE=0

        MMU_LOG MSG="Wiper purge and wipe complete - resuming print"

    {% endif %}
