[homing_override]
axes: z
set_position_z: 0
gcode:
    STATUS_HOMING
    G90
    G0 Z5 F500
    G28 X Y
    G0 X125 Y105 F9000
    G28 Z
    G0 Z5 F500
    STATUS_READY

[bed_mesh]
speed: 150
horizontal_move_z: 5
#mesh_min: 45,20
#mesh_max: 210,185
mesh_min: 35,20
mesh_max: 210,210
probe_count: 9,9
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

[screws_tilt_adjust]
# SW Nylock Mod: Screw 1 uses the 6mm metallic spacer so its
# height is considered the baseline. For tilt adjust using the
# command SCREWS_TILT_CALCULATE, this has to be your Screw 1:
#
#         ******************
#         * S7    S8    S9 *
#         *                * 
#   Bed:  * S5    S1    S6 *  
#         *                *
#         * S2    S3    S4 *
#         ******************
#
screw1: 125,100
screw1_name: center
screw2: 18,0
screw2_name: front_left
screw3: 125,0
screw3_name: front_center
screw4: 233,0
screw4_name: front_right
screw5: 18,100
screw5_name: middle_left
screw6: 233,100
screw6_name: middle_right
screw7: 18,205
screw7_name: rear_left
screw8: 125,205
screw8_name: rear_center
screw9: 233,205
screw9_name: rear_right
horizontal_move_z: 7
speed: 100
screw_thread: CCW-M3