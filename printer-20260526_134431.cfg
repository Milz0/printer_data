[include matchstick_leds.cfg]
[include stealthburner_leds.cfg]
[include mmu/base/*.cfg]
[include mmu/optional/client_macros.cfg]
[include mmu_wiper.cfg]
[include mainsail.cfg]
[include KAMP_Settings.cfg]
[include macros.cfg]
[include homing_meshing.cfg]
[include config_backup.cfg]
[include TEST_SPEED.cfg]
[include shaketune.cfg]
#[include mmu_cut_tip.cfg]
#[include portable_adxl.cfg]
[include mmu_gate_test.cfg]

[exclude_object]

[respond]

[skew_correction]

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_72F75AF25154354D38202020FF0A3027-if00
x_offset: 0 # update with offset from nozzle on your machine
y_offset: 19 # update with offset from nozzle on your machine
mesh_main_direction: x
mesh_runs: 2

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_1B0036000250415339373620-if00

[mcu rpi]
serial: /tmp/klipper_host_mcu

[mcu EBBCan]
canbus_uuid: 23c61eea82ab

[idle_timeout]
timeout: 3600

[gcode_macro M600]
gcode:
    {% set X = params.X|default(125)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(30)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-80 F1000
    RESTORE_GCODE_STATE NAME=M600_state

[printer]
kinematics: corexz
max_velocity: 300
max_accel: 7500
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 5.0

[fan]
pin: EBBCan: gpio13

[heater_fan hotend_fan]
pin: EBBCan: gpio14
heater: extruder
heater_temp: 50.0
max_power: 1.0
kick_start_time: 0.5

[temperature_sensor Toolhead]
sensor_type: Generic 3950
sensor_pin: EBBCan:gpio28

[temperature_sensor Raspberry_Pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor Skr Controller]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[adxl345]
cs_pin: EBBCan:gpio1
spi_software_sclk_pin: EBBCan:gpio2
spi_software_mosi_pin: EBBCan:gpio0
spi_software_miso_pin: EBBCan:gpio3
axes_map: z,-y,x

[resonance_tester]
accel_chip: toolhead
accel_chip: beacon
probe_points: 125, 125, 25
sweeping_period: 0
accel_per_hz: 100
sweeping_accel: 400

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 32
gear_ratio: 50:10
rotation_distance: 22.558
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan:gpio27
min_extrude_temp: 0
max_extrude_cross_section: 25
max_extrude_only_distance: 101
min_temp: 0
max_temp: 290
max_power: 1.0

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
run_current: 0.7
stealthchop_threshold: 0

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: EBBCan:gpio24
position_endstop: 250
position_min: -62
position_max: 250
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.8
interpolate: False
stealthchop_threshold: 0

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0 # Uncomment this line too
position_endstop: 250
position_min: 0
position_max: 250
homing_speed: 50
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.8
interpolate: False
stealthchop_threshold: 0
diag_pin: ^PC1
driver_SGTHRS: 60 # tune this once it's working.

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 230
homing_speed: 40
position_min: -1.0

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.7
interpolate: False
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: Generic 3950
sensor_pin: PC4
min_temp: 0
max_temp: 115

[output_pin CPU_fan]
pin: rpi:gpio14
pwm: True
value: 1
cycle_time: 0.100
hardware_pwm: False

